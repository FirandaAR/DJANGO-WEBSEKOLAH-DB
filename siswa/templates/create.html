{% extends 'base.html' %}

{% block content %}
<h1 class="text-3xl font-bold text-slate-900">Tambah Siswa Baru</h1>
<br>

<form method="POST" class="space-y-4">
    {% csrf_token %} <!-- WAJIB ADA di Django untuk keamanan -->
    
     <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nama</label>
        <input type="text" name="nama" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Umur</label>
        <input type="number" name="umur" max=100 min="0" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
        <input type="date" name="tgl_lahir" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nilai Akhir</label>
        <input type="number" step="0.1" name="nilai_akhir" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
            <input type="radio" name="status_hadir" id="hadir" value="true" required checked>
            <label for="hadir" class="text-slate-900 font-medium">Hadir</label>
        </div>
        <div class="flex items-center gap-2">
            <input type="radio" name="status_hadir" id="tidak_hadir" value="false" required>
            <label for="tidak_hadir" class="text-slate-900 font-medium">Tidak Hadir</label>
        </div>
    </div>
    

     
    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            Simpan
        </button>

        <a href="{% url 'siswa_list' %}"
           class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
            Batal
        </a>
    </div>
</form>
{% endblock %}
